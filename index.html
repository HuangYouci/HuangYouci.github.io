<!DOCTYPE html>
<html>
  <head>
    <style>
      .text {
        font-size: 36px;
        font-weight: bold;
        text-shadow: 2px 2px white;
        text-align: center;
        animation: color-change 1s linear infinite;
      }
      
      @keyframes color-change {
        0% {
          color: purple;
        }
        50% {
          color: blue;
        }
        100% {
          color: purple;
        }
      }
    </style>
  </head>
  <body>
      <div class="text">Hello World!</div>
  </body>
</html>
