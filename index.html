<!DOCTYPE html>
<html>
  <head>
    <style>
      .bg-image {
        background-image: url("http://i.epochtimes.com/assets/uploads/2018/05/Fotolia_41253548_Subscription_L-600x400.jpg");
        background-size: cover;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .text {
        font-size: 36px;
        font-weight: bold;
        text-shadow: 2px 2px white;
        text-align: center;
        animation: color-change 1s linear infinite;
      }
      
      @keyframes color-change {
        0% {
          color: purple;
        }
        50% {
          color: blue;
        }
        100% {
          color: purple;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-image">
      <div class="text">Hello World!</div>
    </div>
  </body>
</html>
