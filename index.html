<!DOCTYPE html>
<html>
  <head>
    <title>@huangyouci</title>
    <style>
      .text {
        font-size: 10vw;
        font-weight: bold;
        text-align: center;
        animation: color-change 5s linear infinite;
      }
      
      @keyframes color-change {
        0% {
            color: red;
        }
        10% {
            color: orange;
        }
        20% {
            color: yellow;
        }
        30% {
            color: green;
        }
        40% {
            color: blue;
        }
        50% {
          color: purple;
        }
        60% {
            color: red;
        }
        70% {
            color: orange;
        }
        80% {
            color: yellow;
        }
        90% {
            color: green;
        }
        100% {
            color: red;
        }
      }
    </style>
  </head>
  <body>
      <div class="text">真瞎趴</div>
  </body>
</html>
